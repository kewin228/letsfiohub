<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Let's FioHub - Просмотр видео</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f0f0f;
            color: #fff;
        }
        .header {
            background: #202020;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }
        .logo {
            font-size: 20px;
            font-weight: bold;
            color: #ff0000;
            cursor: pointer;
        }
        .back-btn {
            background: #3a3a3a;
            border: none;
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }
        .container {
            max-width: 1200px;
            margin: 80px auto 0;
            padding: 24px;
        }
        video {
            width: 100%;
            background: #000;
            border-radius: 12px;
        }
        .video-title {
            font-size: 20px;
            margin: 20px 0 10px;
        }
        .video-stats {
            color: #aaa;
            margin-bottom: 20px;
        }
        .action-btn {
            background: #2a2a2a;
            border: none;
            color: #fff;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            margin-right: 10px;
        }
        .description {
            background: #1a1a1a;
            padding: 16px;
            border-radius: 12px;
            margin-top: 20px;
        }
        .settings-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1a1a1a;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo" onclick="location.href='index.html'">🎬 Let's FioHub</div>
        <button class="back-btn" onclick="location.href='index.html'">← На главную</button>
    </div>
    <div class="container">
        <video id="player" controls autoplay>
            <source id="videoSource" src="">
        </video>
        <div class="video-title" id="title">Загрузка...</div>
        <div class="video-stats" id="stats"></div>
        <button class="action-btn" id="likeBtn">❤️ <span id="likeCount">0</span></button>
        <div class="description" id="description"></div>
    </div>
    <div class="settings-btn" onclick="openSettings()">⚙️</div>

    <script>
        const video = JSON.parse(localStorage.getItem('current_video'));
        let likes = localStorage.getItem(`likes_${video?.id}`) || 0;
        
        if (video) {
            document.getElementById('title').innerText = video.title;
            document.getElementById('stats').innerHTML = `${video.views.toLocaleString()} просмотров`;
            document.getElementById('description').innerHTML = video.description || "Нет описания";
            document.getElementById('videoSource').src = video.url;
            document.getElementById('player').load();
            document.getElementById('likeCount').innerText = likes;
        }
        
        document.getElementById('likeBtn').onclick = () => {
            likes++;
            document.getElementById('likeCount').innerText = likes;
            localStorage.setItem(`likes_${video.id}`, likes);
        };
        
        function openSettings() {
            const speed = prompt('Скорость воспроизведения (0.5, 1, 1.5, 2):', '1');
            if (speed) {
                document.getElementById('player').playbackRate = parseFloat(speed);
            }
        }
    </script>
</body>
</html>
