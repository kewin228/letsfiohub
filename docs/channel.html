<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Let's FioHub - Мой канал</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #0f0f0f; color: #fff; }
        .header { background: #202020; padding: 12px 24px; position: fixed; top: 0; left: 0; right: 0; z-index: 100; }
        .logo { font-size: 24px; font-weight: bold; background: linear-gradient(135deg, #ff0000, #ff4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }
        .sidebar { width: 240px; background: #1a1a1a; position: fixed; left: 0; top: 56px; bottom: 0; padding: 16px 0; }
        .sidebar ul { list-style: none; }
        .sidebar li { padding: 10px 24px; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .sidebar li:hover { background: #2a2a2a; }
        .main { margin-left: 240px; margin-top: 56px; padding: 24px; }
        .channel-header { background: linear-gradient(135deg, #1a1a1a, #2a2a2a); padding: 30px; border-radius: 16px; margin-bottom: 30px; }
        .channel-name { font-size: 32px; margin-bottom: 10px; }
        .channel-stats { color: #aaa; margin-bottom: 20px; }
        button { background: #3ea6ff; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; color: #fff; margin-right: 10px; }
        .delete-btn { background: #ff4444; }
        .video-item { background: #1a1a1a; padding: 15px; margin: 10px 0; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .video-item:hover { background: #2a2a2a; }
        .empty { text-align: center; padding: 50px; color: #aaa; }
        h2 { margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="header"><div class="logo" onclick="location.href='index.html'">🎬 Let's FioHub</div></div>
    <div class="sidebar"><ul><li onclick="location.href='index.html'">🏠 Главная</li><li onclick="location.href='channel.html'">📺 Мой канал</li><li>🔔 Подписки</li><li>📜 История</li><li>👥 Мои подписчики</li></ul></div>
    <div class="main">
        <div class="channel-header"><div class="channel-name">👤 Ivan Ozilov's Channel</div><div class="channel-stats">Нет описания • 0 подписчиков</div><button onclick="editChannel()">✏️ Редактировать канал</button></div>
        <h2>📹 Видео</h2>
        <div id="videosContainer"></div>
    </div>
    <script>
        let videos = JSON.parse(localStorage.getItem('fiohub_videos') || '[]');
        function displayVideos() {
            const container = document.getElementById('videosContainer');
            const myVideos = videos.filter(v => v.channel === "Ivan Ozilov");
            if (myVideos.length === 0) { container.innerHTML = '<div class="empty">📭 Нет видео</div>'; return; }
            container.innerHTML = myVideos.map(v => `<div class="video-item" onclick="watchVideo('${v.id}')"><div><strong>${escapeHtml(v.title)}</strong><br><small>${v.views.toLocaleString()} просмотров</small></div><button class="delete-btn" onclick="event.stopPropagation(); deleteVideo('${v.id}')">🗑 Удалить</button></div>`).join('');
        }
        function watchVideo(id) { const v = videos.find(v => v.id === id); if (v) { localStorage.setItem('current_video', JSON.stringify(v)); location.href = 'watch.html'; } }
        function deleteVideo(id) { if (confirm('Удалить?')) { videos = videos.filter(v => v.id !== id); localStorage.setItem('fiohub_videos', JSON.stringify(videos)); displayVideos(); } }
        function editChannel() { const newName = prompt('Новое название:', 'Ivan Ozilov\'s Channel'); if (newName) { document.querySelector('.channel-name').innerHTML = `👤 ${newName}`; } }
        function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        displayVideos();
    </script>
</body>
</html>
