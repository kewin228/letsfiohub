<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Let's FioHub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: white;
        }
        .container {
            display: flex;
        }
        .sidebar {
            width: 240px;
            background: #202020;
            height: 100vh;
            position: fixed;
            padding: 20px;
        }
        .sidebar h2 {
            color: #ff0000;
            margin-bottom: 20px;
        }
        .sidebar ul {
            list-style: none;
        }
        .sidebar li {
            padding: 12px;
            margin: 5px 0;
            cursor: pointer;
            border-radius: 8px;
        }
        .sidebar li:hover {
            background: #3a3a3a;
        }
        .main {
            margin-left: 260px;
            padding: 20px;
            width: calc(100% - 260px);
        }
        .tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            border-bottom: 1px solid #3a3a3a;
            padding-bottom: 10px;
        }
        .tab {
            cursor: pointer;
            padding: 8px 16px;
        }
        .tab.active {
            color: #3ea6ff;
            border-bottom: 2px solid #3ea6ff;
        }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .video-card {
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
        }
        .thumbnail {
            background: #2a2a2a;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        .video-info {
            padding: 12px;
        }
        .video-title {
            font-weight: bold;
        }
        .video-channel {
            color: #aaa;
            font-size: 14px;
            margin-top: 5px;
        }
        .video-stats {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>🎬 Let's FioHub</h2>
            <ul>
                <li>🏠 Главная</li>
                <li>⚡ Quick</li>
                <li>📺 Мой канал</li>
                <li>🔔 Подписки</li>
                <li>📜 История</li>
                <li>👥 Мои подписчики</li>
            </ul>
        </div>
        <div class="main">
            <div class="tabs">
                <div class="tab active">Все видео</div>
                <div class="tab">Тренды</div>
                <div class="tab">Рекомендации</div>
            </div>
            <div id="videoGrid" class="video-grid"></div>
        </div>
    </div>

    <script>
        // Точные данные со второго скриншота
        const videos = [
            {
                title: "Аudi",
                channel: "Ivan Ozilov",
                stats: "19 пиктограмм"
            }
        ];
        
        const grid = document.getElementById('videoGrid');
        grid.innerHTML = videos.map(video => `
            <div class="video-card">
                <div class="thumbnail">🎬</div>
                <div class="video-info">
                    <div class="video-title">${video.title}</div>
                    <div class="video-channel">${video.channel}</div>
                    <div class="video-stats">${video.stats}</div>
                </div>
            </div>
        `).join('');
    </script>
</body>
</html>
